<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="shortcut icon" href="/logo.png" type="image/x-icon">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="DealPost helps local buyers and sellers discover trusted listings, compare offers, and move faster with a smooth marketplace experience." />
  <meta name="robots" content="index,follow,max-image-preview:large" />
  <meta name="theme-color" content="#f5f5f0" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="DealPost | Local Deals, Faster" />
  <meta property="og:description"
    content="Buy, sell, compare, and message in one fast marketplace built for local deals." />
  <meta property="og:image" content="/logo.png" />
  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:title" content="DealPost | Local Deals, Faster" />
  <meta property="twitter:description"
    content="Buy, sell, compare, and message in one fast marketplace built for local deals." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Poppins:wght@600;700;800&display=swap"
    onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Poppins:wght@600;700;800&display=swap" />
  </noscript>
  <link rel="preload" as="image" href="/images/optimized/hero-living-1200.webp"
    imagesrcset="/images/optimized/hero-living-300.webp 300w, /images/optimized/hero-living-600.webp 600w, /images/optimized/hero-living-1200.webp 1200w"
    imagesizes="100vw" fetchpriority="high" />
  <style>
    .hero-lcp-shell {
      min-height: 190px;
      border-radius: 20px;
      overflow: hidden;
      background: #111;
    }

    @media (min-width: 640px) {
      .hero-lcp-shell {
        min-height: 220px;
        border-radius: 24px;
      }
    }

    @media (min-width: 768px) {
      .hero-lcp-shell {
        min-height: 260px;
      }
    }

    @media (min-width: 1024px) {
      .hero-lcp-shell {
        min-height: 300px;
      }
    }
  </style>
  <title>DealPost | Local Deals, Faster</title>
</head>

  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
